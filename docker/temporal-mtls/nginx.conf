# nginx stream (TCP-level) proxy for Temporal gRPC auth coverage tests.
#
# Two listeners sit in front of the Temporal dev server (port 7233):
#
#   Port 7235 — mutual TLS (mTLS)
#     nginx requires a valid client certificate signed by ca.crt.
#     Used by the SELF_HOSTED + mTLS integration test variant.
#
#   Port 7236 — one-way TLS
#     nginx presents a server certificate but does NOT require a client cert.
#     Used by the CLOUD + API-key integration test variant.
#
# The Temporal dev server (plain gRPC / h2c) runs on port 7233.
# nginx terminates TLS and proxies raw HTTP/2 frames to port 7233.
#
# Certificate paths are bind-mounted from the host at runtime:
#   /etc/nginx/certs/ca.crt
#   /etc/nginx/certs/server.crt
#   /etc/nginx/certs/server.key
#   /etc/nginx/certs/client.crt  (only needed by the Ballerina test client)

worker_processes auto;

events {}

stream {

    # --- mTLS listener (port 7235) ---
    server {
        listen 7235 ssl;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        # Require and verify client certificate
        ssl_client_certificate /etc/nginx/certs/ca.crt;
        ssl_verify_client      on;

        ssl_protocols    TLSv1.2 TLSv1.3;
        ssl_session_cache shared:mTLS:4m;
        ssl_session_timeout 1h;

        proxy_pass      127.0.0.1:7233;
        proxy_timeout   60s;
        proxy_connect_timeout 5s;
    }

    # --- TLS-only listener (port 7236, no client cert required) ---
    server {
        listen 7236 ssl;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols    TLSv1.2 TLSv1.3;
        ssl_session_cache shared:TLS:4m;
        ssl_session_timeout 1h;

        proxy_pass      127.0.0.1:7233;
        proxy_timeout   60s;
        proxy_connect_timeout 5s;
    }
}
